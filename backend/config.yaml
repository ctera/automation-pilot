server:
  port: 8080
  host: "0.0.0.0"

vmtools:
  jar_path: "/opt/automation-pilot/VmTools.jar"
  java_cmd: "java"
  timeout_seconds: 120

jenkins:
  url: "https://jenkins.ctera.dev"
  # credentials loaded from env: JENKINS_USER, JENKINS_TOKEN
  cleanup_job_name: "TBD_CLEANUP_JOB"

monitored_jenkins_jobs:
  - PIM_automation_dispatcher
  - Run_All_Portal_Test_Suites
  - deploy_and_run_smoke
  - deploy_and_run_smoke_win11
  - PIM_sanity_ESXI
  - PIM_sanity_KVM
  - PIM_sanity_AWS

thresholds:
  storage:
    ready_below: 70
    constrained_below: 85
    # saturated: >= 85
  cpu:
    ready_below: 75
    constrained_below: 85
    # saturated: >= 85

staleness:
  warning_minutes: 5

deployment_window_minutes: 30

hosts:
  - "192.168.81.155"
  - "192.168.81.158"

datastores:
  - "Hitachi-BS26-Automation-1"
  - "Hitachi-BS26-Automation-2"
  - "Hitachi-BS26-Automation-3"
  - "Hitachi-BS26-Automation-4"

datastore_host: "192.168.81.155"
datacenter: "CTERA"

vm_folders:
  - "/DevProd/QA/PIM"
  - "/DevProd/QA/Portal-Daily"
  - "/DevProd/QA/Portal-Daily-Toggles"
  - "/DevProd/QA/Portal-Patch"
  - "/DevProd/QA/Portal-Patch-Toggles"
  - "/DevProd/QA/Portal-Smoke"

jobs: []
