server:
  port: 8080
  host: "0.0.0.0"

vmtools:
  jar_path: "VmTools.jar"
  java_cmd: "java"
  timeout_seconds: 120

jenkins:
  url: "https://jenkins.ctera.dev"
  # credentials loaded from env: JENKINS_USER, JENKINS_TOKEN
  cleanup_job_name: "TBD_CLEANUP_JOB"

monitored_jenkins_jobs:
  - name: PIM_automation_dispatcher
    team: Portal
  - name: Run_All_Portal_Test_Suites
    team: Portal
  - name: deploy_and_run_smoke
    team: Portal
  - name: deploy_and_run_smoke_win11
    team: Portal
  - name: PIM_sanity_ESXI
    team: Portal
  - name: PIM_sanity_KVM
    team: Portal
  - name: PIM_sanity_AWS
    team: Portal
  - name: insight_2_sanity
    team: Portal
  - name: insight_2_sanity_tmp
    team: Portal

thresholds:
  storage:
    ready_below: 70
    constrained_below: 85
    # saturated: >= 85
  cpu:
    ready_below: 75
    constrained_below: 85
    # saturated: >= 85

staleness:
  warning_minutes: 5

deployment_window_minutes: 30

hosts:
  - "192.168.81.155"
  - "192.168.81.158"

datastores:
  - "Hitachi-BS26-Automation-1"
  - "Hitachi-BS26-Automation-2"
  - "Hitachi-BS26-Automation-3"
  - "Hitachi-BS26-Automation-4"

datastore_host: "192.168.81.155"
datacenter: "CTERA"

vm_folders:
  - path: "DevProd/QA/PIM"
    group: "Portal"
  - path: "DevProd/QA/Portal-Smoke"
    group: "Portal"
  - path: "DevProd/QA/Portal-Daily"
    group: "Portal"
  - path: "DevProd/QA/Portal-Daily-Toggles"
    group: "Portal"
  - path: "DevProd/QA/Portal-Patch"
    group: "Portal"
  - path: "DevProd/QA/Portal-Patch-Toggles"
    group: "Portal"
  - path: "DevProd/QA/CloudFS-Agent"
    group: "CloudFS"
  - path: "DevProd/QA/CloudFS-Genesis"
    group: "CloudFS"
  - path: "DevProd/QA/CloudFS-LatestPortalAndGenesis"
    group: "CloudFS"
  - path: "DevProd/QA/CloudFS-Portal"
    group: "CloudFS"
  - path: "DevProd/QA/Systems-Genesis"
    group: "Gateway"

jobs: []
